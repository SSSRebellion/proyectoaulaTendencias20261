databases:
  - name: banco-db
    databaseName: banco
    user: banco
    plan: free

services:
  - type: web
    name: banco-api
    runtime: python
    plan: free
    rootDir: banco
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn banco.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: banco-db
          property: connectionString
